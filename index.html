<!doctype html>
<html lang="he" dir="rtl">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>מלאי בשרים</title>
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#222222">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <style>
    :root{--bg:#f4f5f7;--card:#fff;--text:#222;--muted:#666;--green:#d9f2df;--blue:#dcecff;--red:#ffe1e1;--gray:#eeeeee;--dark:#222;--border:#e6e6e6}
    *{box-sizing:border-box} body{font-family:Arial,sans-serif;background:var(--bg);margin:0;color:var(--text);font-size:17px}
    header{position:sticky;top:0;background:var(--bg);z-index:5;padding:14px 14px 8px;border-bottom:1px solid #ddd}
    h1{font-size:26px;margin:0 0 10px}.container{padding:12px;max-width:1100px;margin:auto}
    .card,.panel{background:var(--card);border-radius:18px;padding:16px;margin-bottom:14px;box-shadow:0 2px 10px #00000012;border:1px solid var(--border)}
    .productName{font-size:24px;font-weight:800;margin-bottom:12px}.nums{display:grid;grid-template-columns:1fr 1fr 1fr;gap:9px;margin-bottom:14px}
    .num{background:#f1f1f1;border-radius:14px;text-align:center;padding:12px 6px;font-size:15px}.num b{display:block;font-size:22px;margin-top:5px}
    .available.ok{background:#dcf7e2}.available.low{background:#fff1c8}.available.zero{background:#ffdada}
    .actions{display:grid;grid-template-columns:1fr 1fr;gap:8px}
    button{border:0;border-radius:14px;padding:14px 10px;font-size:17px;font-weight:700;cursor:pointer}button:active{transform:scale(.98)}
    .add{background:var(--green)}.reserve{background:var(--blue)}.sold{background:var(--red)}.cancel{background:var(--gray)}
    .main{background:var(--dark);color:white;width:100%}.danger{background:#fff0f0;color:#b00020;border:1px solid #ffd0d0}
    input{width:100%;padding:13px;border:1px solid #ccc;border-radius:14px;font-size:18px;margin-bottom:8px}
    .small{font-size:13px;color:var(--muted);margin-top:8px}.hidden{display:none!important}
    .topActions{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:8px}.panelTitle{font-size:21px;font-weight:800;margin-bottom:10px}
    .lowBorder{border:2px solid #ffb300}.zeroBorder{border:2px solid #d60000}
    .modalBack{position:fixed;inset:0;background:#0008;z-index:20;display:flex;align-items:flex-end}
    .modal{background:white;width:100%;border-radius:22px 22px 0 0;padding:18px;max-width:560px;margin:auto}.modal h2{margin:0 0 12px;font-size:24px}
    .toast{position:fixed;bottom:18px;right:14px;left:14px;background:#222;color:white;border-radius:14px;padding:13px;text-align:center;z-index:30;font-weight:bold}
    .fab{position:fixed;bottom:18px;left:18px;border-radius:999px;background:#222;color:white;padding:16px 20px;box-shadow:0 4px 16px #0005;z-index:10}
    @media (min-width:760px){.grid{display:grid;grid-template-columns:1fr 1fr;gap:14px}.card{margin-bottom:0}.modalBack{align-items:center}.modal{border-radius:22px}}
    @media (min-width:1050px){.grid{grid-template-columns:1fr 1fr 1fr}}
  </style>
</head>
<body>
<header>
  <h1>מלאי בשרים</h1>
  <div id="loggedTop" class="hidden">
    <input id="search" placeholder="🔍 חיפוש מוצר">
    <div class="topActions"><button class="main" id="showAddProduct">➕ מוצר חדש</button><button class="cancel" id="logoutBtn">יציאה</button></div>
    <div class="small" id="email"></div>
  </div>
</header>
<div class="container">
  <div id="loginBox" class="panel"><div class="panelTitle">כניסה למערכת</div><button class="main" id="loginBtn">כניסה עם Google</button></div>
  <div id="app" class="hidden"><div id="summary" class="panel"></div><div id="products" class="grid"></div></div>
</div>
<button id="fabAdd" class="fab hidden">➕ מוצר</button>
<div id="modalBack" class="modalBack hidden"><div class="modal"><button class="cancel" id="modalX" style="float:left">סגור</button><h2 id="modalTitle"></h2><div id="modalContent"></div></div></div>
<div id="toast" class="toast hidden"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-app.js";
import { getAuth, GoogleAuthProvider, signInWithPopup, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-auth.js";
import { getFirestore, collection, addDoc, doc, deleteDoc, onSnapshot, runTransaction, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore.js";

const firebaseConfig = {apiKey:"AIzaSyDqOGL6rryJJKbh42UOpy6oylNc6KMx8-g",authDomain:"flishyg.firebaseapp.com",projectId:"flishyg",storageBucket:"flishyg.firebasestorage.app",messagingSenderId:"804794114946",appId:"1:804794114946:web:83d54137eeca64dda3659b",measurementId:"G-8123WEB05J"};
const fb=initializeApp(firebaseConfig),auth=getAuth(fb),db=getFirestore(fb),provider=new GoogleAuthProvider();
let products=[],unsubscribe=null,currentAction=null,currentProduct=null;
const defaults=["אצבעות אנטריקוט","צלעות אונטריב","מס' 5","מס' 8","לשון","בשר ראש"];
const $=id=>document.getElementById(id), num=v=>Number.isFinite(Number(v))?Number(v):0;
const esc=s=>String(s??"").replace(/[&<>"']/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#039;"}[c]));
$("loginBtn").onclick=()=>signInWithPopup(auth,provider).catch(e=>alert(e.message));
$("logoutBtn").onclick=()=>signOut(auth); $("showAddProduct").onclick=showAddProduct; $("fabAdd").onclick=showAddProduct; $("search").oninput=render;
$("modalBack").onclick=e=>{if(e.target.id==="modalBack")closeModal()}; $("modalX").onclick=closeModal;

onAuthStateChanged(auth,async user=>{
 if(!user){$("loginBox").classList.remove("hidden");$("app").classList.add("hidden");$("loggedTop").classList.add("hidden");$("fabAdd").classList.add("hidden");if(unsubscribe)unsubscribe();return}
 $("loginBox").classList.add("hidden");$("app").classList.remove("hidden");$("loggedTop").classList.remove("hidden");$("fabAdd").classList.remove("hidden");$("email").textContent=user.email||"";
 unsubscribe=onSnapshot(collection(db,"products"),async snap=>{
  products=snap.docs.map(d=>({id:d.id,...d.data()})); products.sort((a,b)=>String(a.name||"").localeCompare(String(b.name||""),"he"));
  if(products.length===0){for(const name of defaults) await addDoc(collection(db,"products"),{name,qty:0,reserved:0,min:1,createdAt:serverTimestamp()});return}
  render();
 },e=>alert("שגיאה: "+e.message));
});

function showToast(msg){$("toast").textContent=msg;$("toast").classList.remove("hidden");setTimeout(()=>$("toast").classList.add("hidden"),1800)}
function openModal(title,html){$("modalTitle").innerHTML=title;$("modalContent").innerHTML=html;$("modalBack").classList.remove("hidden")}
function closeModal(){$("modalBack").classList.add("hidden")}
function showAddProduct(){openModal("➕ הוסף מוצר",`<input id="newName" placeholder="שם מוצר"><input id="newQty" type="number" step="0.01" placeholder="כמות התחלתית בק״ג"><input id="newMin" type="number" step="0.01" placeholder="מינימום להתראה"><button class="main" id="saveNewProduct">שמור מוצר</button><button class="cancel" id="closeModalBtn">ביטול</button>`);$("saveNewProduct").onclick=addProduct;$("closeModalBtn").onclick=closeModal}
async function addProduct(){const name=$("newName").value.trim(),qty=num($("newQty").value),min=$("newMin").value===""?1:num($("newMin").value);if(!name)return alert("תכניס שם מוצר");if(qty<0||min<0)return alert("כמות לא יכולה להיות שלילית");if(products.some(p=>p.name===name))return alert("המוצר כבר קיים");await addDoc(collection(db,"products"),{name,qty,reserved:0,min,createdAt:serverTimestamp()});closeModal();showToast("המוצר נוסף")}
function showAction(productId,action){currentProduct=products.find(p=>p.id===productId);currentAction=action;const titles={add:"➕ הוסף מלאי",reserve:"📌 שריין",sale:"🛒 מכירה רגילה",pickup:"📦 נאסף מהזמנה",cancel:"❌ בטל שריון"};openModal(`${titles[action]}<br>${esc(currentProduct.name)}`,`<input id="actionQty" type="number" step="0.01" placeholder="כמות בק״ג" autofocus><button class="main" id="doAction">אישור</button><button class="cancel" id="closeModalBtn">ביטול</button>`);$("doAction").onclick=doAction;$("closeModalBtn").onclick=closeModal}
async function doAction(){const val=num($("actionQty").value);if(val<=0)return alert("תכניס כמות תקינה");const ref=doc(db,"products",currentProduct.id);try{await runTransaction(db,async tx=>{const snap=await tx.get(ref),p=snap.data(),qty=num(p.qty),reserved=num(p.reserved),available=qty-reserved;if(currentAction==="add")tx.update(ref,{qty:qty+val});if(currentAction==="reserve"){if(available<val)throw new Error("אין מספיק זמין לשריון");tx.update(ref,{reserved:reserved+val})}if(currentAction==="sale"){if(qty<val)throw new Error("אין מספיק במלאי");tx.update(ref,{qty:qty-val})}if(currentAction==="pickup"){if(reserved<val)throw new Error("אין מספיק משוריין");if(qty<val)throw new Error("אין מספיק במלאי");tx.update(ref,{reserved:reserved-val,qty:qty-val})}if(currentAction==="cancel"){if(reserved<val)throw new Error("אין מספיק שריון לביטול");tx.update(ref,{reserved:reserved-val})}});closeModal();showToast("עודכן בהצלחה")}catch(e){alert(e.message)}}
async function deleteProduct(id){const p=products.find(x=>x.id===id);if(num(p.qty)>0||num(p.reserved)>0)return alert("אי אפשר למחוק מוצר שיש לו מלאי או שריון");if(confirm("למחוק את "+p.name+"?"))await deleteDoc(doc(db,"products",id))}
function render(){const search=$("search").value.trim();const list=products.filter(p=>!search||String(p.name||"").includes(search));let totalQty=0,totalReserved=0,lowCount=0;products.forEach(p=>{totalQty+=num(p.qty);totalReserved+=num(p.reserved);if(num(p.qty)-num(p.reserved)<=num(p.min))lowCount++});$("summary").innerHTML=`<div class="nums"><div class="num">סה״כ מלאי<b>${totalQty.toFixed(2)}</b></div><div class="num">משוריין<b>${totalReserved.toFixed(2)}</b></div><div class="num">חוסרים<b>${lowCount}</b></div></div>`;$("products").innerHTML=list.map(p=>{const qty=num(p.qty),reserved=num(p.reserved),min=num(p.min),available=qty-reserved;let statusClass="ok",cardClass="";if(available<=0){statusClass="zero";cardClass="zeroBorder"}else if(available<=min){statusClass="low";cardClass="lowBorder"}return `<div class="card ${cardClass}"><div class="productName">${esc(p.name)}</div><div class="nums"><div class="num">במלאי<b>${qty.toFixed(2)}</b></div><div class="num">משוריין<b>${reserved.toFixed(2)}</b></div><div class="num available ${statusClass}">זמין<b>${available.toFixed(2)}</b></div></div><div class="actions"><button class="add" data-action="add" data-id="${p.id}">➕ הוסף</button><button class="reserve" data-action="reserve" data-id="${p.id}">📌 שריין</button><button class="sold" data-action="sale" data-id="${p.id}">🛒 מכר</button><button class="sold" data-action="pickup" data-id="${p.id}">📦 נאסף</button><button class="cancel" data-action="cancel" data-id="${p.id}">❌ בטל שריון</button></div><div class="small">מינימום להתראה: ${min.toFixed(2)} ק״ג</div><button class="danger" data-delete="${p.id}">מחק מוצר</button></div>`}).join("");document.querySelectorAll("[data-action]").forEach(b=>b.onclick=()=>showAction(b.dataset.id,b.dataset.action));document.querySelectorAll("[data-delete]").forEach(b=>b.onclick=()=>deleteProduct(b.dataset.delete))}
</script>
<script>
if ("serviceWorker" in navigator) {
  window.addEventListener("load", () => {
    navigator.serviceWorker.register("./sw.js").catch(() => {});
  });
}
</script>
</body>
</html>
