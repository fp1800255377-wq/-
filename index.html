<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>מלאי פשוט</title>
  <style>
    body{font-family:Arial, sans-serif;background:#f6f6f6;margin:0;padding:16px;color:#222}
    h1{font-size:24px;margin:0 0 12px}
    .note{background:#fff3cd;padding:10px;border-radius:10px;margin-bottom:12px}
    .card,.top{background:white;border-radius:14px;padding:14px;margin-bottom:12px;box-shadow:0 2px 8px #0001}
    .name{font-size:20px;font-weight:bold;margin-bottom:8px}
    .nums{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:12px}
    .box{background:#f0f0f0;border-radius:10px;padding:10px;text-align:center}
    .box b{display:block;font-size:18px}
    button{border:0;border-radius:10px;padding:10px 12px;margin:3px;font-size:15px;cursor:pointer}
    .add{background:#d4edda}.reserve{background:#cce5ff}.sold{background:#f8d7da}.cancel{background:#eee}
    .main{background:#222;color:white;width:100%;margin-top:8px}
    .delete{background:#fff0f0;color:#b00020;border:1px solid #ffd0d0}
    .low{border:2px solid #dc3545}
    input{width:90px;padding:9px;border:1px solid #ccc;border-radius:9px;font-size:16px}
    .wide{width:100%;box-sizing:border-box;margin:4px 0}
    .actions{display:flex;flex-wrap:wrap;gap:4px;align-items:center}
    .small{font-size:13px;color:#666;margin-top:8px}

<body>
  <h1>מלאי מוצרים</h1>

  <div id="login" class="top">
    <button class="main" id="loginBtn">כניסה עם Google</button>
  </div>

  <div id="appWrap" class="hidden">
    <div class="top">
      <button class="main" id="logoutBtn">יציאה</button>
      <div class="small" id="email"></div>
    </div>

    <div class="top">
      <div class="name">➕ הוסף מוצר</div>
      <input id="newName" class="wide" placeholder="שם מוצר">
      <input id="newQty" class="wide" type="number" step="0.01" placeholder="כמות התחלתית בק״ג">
      <input id="newMin" class="wide" type="number" step="0.01" placeholder="מינימום להתראה">
      <button class="main" id="addProductBtn">שמור מוצר</button>
    </div>

    <div class="note">הנתונים נשמרים בענן ומסתנכרנים בין המכשירים שלך.</div>
    <div id="app"></div>
  </div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-app.js";
import { getAuth, GoogleAuthProvider, signInWithPopup, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-auth.js";
import { getFirestore, collection, addDoc, doc, deleteDoc, onSnapshot, runTransaction, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyDqOGL6rryJJKbh42UOpy6oylNc6KMx8-g",
  authDomain: "flishyg.firebaseapp.com",
  projectId: "flishyg",
  storageBucket: "flishyg.firebasestorage.app",
  messagingSenderId: "804794114946",
  appId: "1:804794114946:web:83d54137eeca64dda3659b",
  measurementId: "G-8123WEB05J"
};

const firebaseApp = initializeApp(firebaseConfig);
const auth = getAuth(firebaseApp);
const db = getFirestore(firebaseApp);
const provider = new GoogleAuthProvider();

const defaultProducts = ["אצבעות אנטריקוט","צלעות אונטריב","מס' 5","מס' 8","לשון","בשר ראש"];
let stock = [];
let unsubscribe = null;

const $ = id => document.getElementById(id);
const num = v => Number.isFinite(Number(v)) ? Number(v) : 0;
const esc = s => String(s ?? "").replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#039;'}[c]));

$("loginBtn").onclick = () => signInWithPopup(auth, provider).catch(e => alert(e.message));
$("logoutBtn").onclick = () => signOut(auth);
$("addProductBtn").onclick = addProduct;

onAuthStateChanged(auth, async user => {
  if (!user) {
    $("login").classList.remove("hidden");
    $("appWrap").classList.add("hidden");
    if (unsubscribe) unsubscribe();
    return;
  }

  $("login").classList.add("hidden");
  $("appWrap").classList.remove("hidden");
  $("email").textContent = user.email || "";

  unsubscribe = onSnapshot(collection(db, "products"), async snap => {
    stock = snap.docs.map(d => ({id:d.id, ...d.data()}));
    stock.sort((a,b) => String(a.name || "").localeCompare(String(b.name || ""), "he"));

    if (stock.length === 0) {
      for (const name of defaultProducts) {
        await addDoc(collection(db, "products"), {name, qty:0, reserved:0, min:1, createdAt:serverTimestamp()});
      }
      return;
    }

    render();
  }, err => alert("שגיאה בקריאת המלאי: " + err.message));
});

async function addProduct() {
  const name = $("newName").value.trim();
  const qty = num($("newQty").value);
  const min = $("newMin").value === "" ? 1 : num($("newMin").value);

  if (!name) return alert("תכניס שם מוצר");
  if (stock.some(p => p.name === name)) return alert("המוצר כבר קיים");
  if (qty < 0 || min < 0) return alert("כמות לא יכולה להיות שלילית");

  await addDoc(collection(db, "products"), {name, qty, reserved:0, min, createdAt:serverTimestamp()});
  $("newName").value = "";
  $("newQty").value = "";
  $("newMin").value = "";
}

async function change(i, type) {
  const p = stock[i];
  const val = num($("amount-" + p.id).value);
  if (val <= 0) return alert("תכניס כמות תקינה");

  const ref = doc(db, "products", p.id);

  try {
    await runTransaction(db, async tx => {
      const snap = await tx.get(ref);
      const cur = snap.data();
      const qty = num(cur.qty);
      const reserved = num(cur.reserved);
      const available = qty - reserved;

      if (type === "add") tx.update(ref, {qty: qty + val});

      if (type === "reserve") {
        if (available < val) throw new Error("אין מספיק זמין לשריון");
        tx.update(ref, {reserved: reserved + val});
      }

      if (type === "sold") {
        if (reserved < val) throw new Error("אין מספיק משוריין. קודם תשריין או תקטין כמות");
        tx.update(ref, {reserved: reserved - val, qty: qty - val});
      }

      if (type === "cancel") {
        if (reserved < val) throw new Error("אין מספיק שריון לביטול");
        tx.update(ref, {reserved: reserved - val});
      }
    });
    $("amount-" + p.id).value = "";
  } catch(e) {
    alert(e.message);
  }
}

async function deleteProduct(i) {
  const p = stock[i];
  if (num(p.qty) > 0 || num(p.reserved) > 0) return alert("אי אפשר למחוק מוצר שיש לו מלאי או שריון");
  if (confirm("למחוק את " + p.name + "?")) {
    await deleteDoc(doc(db, "products", p.id));
  }
}

function render() {
  const app = $("app");
  app.innerHTML = "";

  stock.forEach((p,i) => {
    const qty = num(p.qty);
    const reserved = num(p.reserved);
    const min = num(p.min);
    const available = qty - reserved;

    const card = document.createElement("div");
    card.className = "card " + (available <= min ? "low" : "");
    card.innerHTML = `
      <div class="name">${esc(p.name)}</div>
      <div class="nums">
        <div class="box">במלאי<b>${qty.toFixed(2)}</b></div>
        <div class="box">משוריין<b>${reserved.toFixed(2)}</b></div>
        <div class="box">זמין<b>${available.toFixed(2)}</b></div>
      </div>
      <div class="actions">
        <input id="amount-${p.id}" type="number" step="0.01" min="0" placeholder="ק״ג">
        <button class="add" onclick="window.changeProduct(${i},'add')">הוסף</button>
        <button class="reserve" onclick="window.changeProduct(${i},'reserve')">שריין</button>
        <button class="sold" onclick="window.changeProduct(${i},'sold')">נמכר/נאסף</button>
        <button class="cancel" onclick="window.changeProduct(${i},'cancel')">בטל שריון</button>
        <button class="delete" onclick="window.deleteProductCard(${i})">מחק</button>
      </div>
    `;
    app.appendChild(card);
  });
}

window.changeProduct = change;
window.deleteProductCard = deleteProduct;
</script>
